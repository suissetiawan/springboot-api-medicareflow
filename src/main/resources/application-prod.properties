# Data source
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Redis
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRED_IN}

# Swagger
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# Warna di konsol
spring.output.ansi.enabled=always

# Set ke WARN agar tidak banyak log "sampah" saat startup
logging.level.root=WARN
logging.level.org.springframework=WARN
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN

# JPA & HIBERNATE
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
logging.level.org.hibernate=ERROR
logging.level.org.hibernate.SQL=OFF

# Package utama Anda tetap INFO agar log buatan Anda muncul
logging.level.com.dibimbing.medicareflow==INFO

# # Di file, kita biarkan detail (tanpa nopex) agar bisa didebug kalau app crash
# logging.file.name=logs/medicareflow.log
# logging.logback.rollingpolicy.max-file-size=10MB
# logging.logback.rollingpolicy.max-history=7
# logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n

# Format log konsol (berwarna & 1 baris)
logging.pattern.console=%clr(%d{yyyy-MM-dd HH:mm:ss}){faint} %clr(%-5p) %clr(%logger{20}){cyan} %clr(:){faint} %m [%clr(%ex{short}){red}]%n